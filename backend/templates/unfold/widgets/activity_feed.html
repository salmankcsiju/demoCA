<div class="flex flex-col gap-4">
    {% for item in recent_activity %}
    <a href="{{ item.link }}" class="flex items-center justify-between p-6 bg-white border border-gray-100 rounded-[2rem] hover:shadow-2xl hover:border-emerald-200 transition-all group">
        <div class="flex items-center gap-6">
            <div class="w-12 h-12 rounded-[1.25rem] {% if item.type == 'order' %}bg-emerald-100 text-emerald-800{% else %}bg-amber-100 text-amber-800{% endif %} flex items-center justify-center group-hover:scale-110 transition-transform">
                <span class="material-symbols-outlined text-[20px]">{{ item.icon }}</span>
            </div>
            <div>
                <p class="text-sm font-serif text-gray-900 leading-tight">{{ item.title }}</p>
                <div class="flex items-center gap-2 mt-1">
                    <span class="text-[9px] font-black uppercase tracking-widest text-gray-400">{{ item.time|timesince }} ago</span>
                    <span class="w-1 h-1 bg-gray-200 rounded-full"></span>
                    <span class="text-[9px] font-black uppercase tracking-widest {% if item.type == 'order' %}text-emerald-500{% else %}text-amber-500{% endif %}">{{ item.type }}</span>
                </div>
            </div>
        </div>
        <div class="text-gray-300 group-hover:text-emerald-500 group-hover:translate-x-1 transition-all">
            <span class="material-symbols-outlined">chevron_right</span>
        </div>
    </a>
    {% empty %}
    <div class="p-10 text-center bg-gray-50 rounded-[2rem] border-2 border-dashed border-gray-200">
        <p class="text-sm text-gray-400 italic">No recent activity recorded in the atelier pulse.</p>
    </div>
    {% endfor %}
</div>
